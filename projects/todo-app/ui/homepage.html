<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Managely</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="main-app">
      <section>
        <!-- user details section -->
        <div class="user-details">
          <div class="greeting">
            <h4 class="greeting-message">Hello!</h4>
            <p class="user-name">Jhon Doe</p>
          </div>
          <div class="user-image">
            <img
              class="user-dp"
              src="../images/user-picture.jpg"
              alt="user image"
            />
          </div>
        </div>
        <!-- search section -->
        <div class="search-section">
          <span></span>
          <div class="search-bar" contenteditable="true">Search medical</div>
          <span class=""></span>
        </div>
      </section>
      <!-- categories section -->
      <section class="categories-section">
        <h1 class="category-title">Category</h1>
        <div class="categoryList">
          <div class="category category-id">
            <img
              src="../images/brush.png"
              alt="brush "
              width="50px"
              height="50px"
            />
            <h4 class="list-title">Design</h4>
            <ul>
              <li>5 tasks</li>
            </ul>
            <span class="add-category">+</span>
          </div>
        </div>
      </section>

      <!-- tasks list section -->
    </main>
    <script type="module" src="../scripts/homepage.js"></script>
  </body>
</html>
